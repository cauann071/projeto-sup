<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

</head>
<body>

  <input type="text" id="nome" placeholder="Digite seu nome">

  <button onclick = "ButtonSave()">Salvar</button>

  <h1 id="mensagem"></h1>
 <script>
  async function ButtonSave() {
    const nickname = document.getElementById('nome').value;

    if (!nickname) {
      alert("Digite um nome!");
      return;
    }

    try {
      const response = await fetch('/usuarios', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          nome: nickname
        })
      });

      const data = await response.json();

      console.log(data);
      
      if (data.sucesso) {
        document.getElementById('mensagem').innerText = "Salvo com sucesso!";
      } else {
        document.getElementById('mensagem').innerText = "Erro ao salvar";
      }

    } catch (err) {
      console.error(err);
      document.getElementById('mensagem').innerText = "Erro na conexão";
    }
  }
</script>
</body>
</html>
